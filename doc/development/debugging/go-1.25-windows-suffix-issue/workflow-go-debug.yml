# Debug workflow for reproducing Windows functab issue
name: Go Debug

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:

  debug-windows-functab:
    strategy:
      matrix:
        os: [ windows-latest ]
        go: [ '1.25' ]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '${{ matrix.go }}'

    # === Original compiler/go md5 (before xgo) ===
    - name: Get ORIGINAL Go path
      shell: pwsh
      run: |
        $goPath = (Get-Command go).Source
        Write-Output "Original go.exe: $goPath"
        $goDir = Split-Path $goPath -Parent
        Write-Output "Original go bin dir: $goDir"
        $goRoot = (go env GOROOT)
        Write-Output "GOROOT: $goRoot"
        "GO_EXE_PATH=$goPath" | Out-File -FilePath $env:GITHUB_ENV -Append
        "GO_BIN_DIR=$goDir" | Out-File -FilePath $env:GITHUB_ENV -Append
        "GO_ROOT=$goRoot" | Out-File -FilePath $env:GITHUB_ENV -Append
      continue-on-error: true

    - name: MD5 of ORIGINAL go.exe and compile.exe
      shell: pwsh
      run: |
        Write-Output "=== ORIGINAL go.exe ==="
        $goExe = "$env:GO_ROOT\bin\go.exe"
        if (Test-Path $goExe) {
          Write-Output "Path: $goExe"
          $md5 = (Get-FileHash -Algorithm MD5 -Path $goExe).Hash
          Write-Output "MD5: $md5"
        } else { Write-Output "NOT FOUND: $goExe" }
        Write-Output "=== ORIGINAL compile.exe ==="
        $compileExe = "$env:GO_ROOT\pkg\tool\windows_amd64\compile.exe"
        if (Test-Path $compileExe) {
          Write-Output "Path: $compileExe"
          $md5 = (Get-FileHash -Algorithm MD5 -Path $compileExe).Hash
          Write-Output "MD5: $md5"
        } else { Write-Output "NOT FOUND: $compileExe" }
      continue-on-error: true

    # === Run xgo test (this triggers --with-setup which rebuilds compiler/go) ===
    - name: Debug functab mini
      shell: pwsh
      run: go run ./script/run-test --install-xgo --with-setup --reset-instrument --log-debug -v ./runtime/test/functab/functab_mini 2>&1 | Tee-Object -FilePath xgo_debug_output.txt
      continue-on-error: true

    # === Dump xgo debug log ===
    - name: Dump xgo debug output (first 200 lines)
      shell: pwsh
      if: always()
      run: |
        if (Test-Path xgo_debug_output.txt) {
          Write-Output "=== xgo debug output (first 200 lines) ==="
          Get-Content xgo_debug_output.txt -TotalCount 200
        }
      continue-on-error: true

    - name: Search xgo debug output for RegisterFuncTab
      shell: pwsh
      if: always()
      run: |
        if (Test-Path xgo_debug_output.txt) {
          Write-Output "=== RegisterFuncTab entries ==="
          Select-String -Path xgo_debug_output.txt -Pattern "RegisterFuncTab" -SimpleMatch
          Write-Output "=== instrumentFuncTrap SKIP entries ==="
          Select-String -Path xgo_debug_output.txt -Pattern "instrumentFuncTrap.*SKIP" -SimpleMatch
          Write-Output "=== instrumentFuncTrap trapped entries ==="
          Select-String -Path xgo_debug_output.txt -Pattern "instrumentFuncTrap.*trapped=" -SimpleMatch
          Write-Output "=== ApplyPatches entries ==="
          Select-String -Path xgo_debug_output.txt -Pattern "ApplyPatches" -SimpleMatch
          Write-Output "=== func names in debug ==="
          Select-String -Path xgo_debug_output.txt -Pattern "Hello|functab" -SimpleMatch
        }
      continue-on-error: true

    # === MD5 of instrumented GOROOT binaries (after --with-setup) ===
    - name: Find instrument GOROOT path
      shell: pwsh
      if: always()
      run: |
        $instBase = "$env:USERPROFILE\.xgo\go-instrument"
        Write-Output "instrument base: $instBase"
        $dirs = Get-ChildItem -Path $instBase -Directory -ErrorAction SilentlyContinue
        if ($dirs) {
          foreach ($d in $dirs) {
            Write-Output "dir: $($d.FullName)"
            $subDirs = Get-ChildItem -Path $d.FullName -Directory -ErrorAction SilentlyContinue | Where-Object { $_.Name -match "^go1\." }
            foreach ($sub in $subDirs) {
              Write-Output "  go version dir: $($sub.FullName)"
            }
          }
        } else {
          Write-Output "No instrument dirs found at $instBase"
        }
      continue-on-error: true

    - name: MD5 of INSTRUMENTED go.exe and compile.exe
      shell: pwsh
      if: always()
      run: |
        Write-Output "=== INSTRUMENTED go.exe ==="
        $instGoFiles = Get-ChildItem -Path "$env:USERPROFILE\.xgo\go-instrument" -Recurse -Filter "go.exe" -ErrorAction SilentlyContinue
        if ($instGoFiles) {
          foreach ($f in $instGoFiles) {
            $dir = Split-Path $f.FullName -Parent
            $isGoRootBin = $dir -match '(\\bin$|\\bin\\)'
            if ($isGoRootBin) {
              Write-Output "go.exe in bin: $($f.FullName)"
              $md5 = (Get-FileHash -Algorithm MD5 -Path $f.FullName).Hash
              Write-Output "MD5: $md5"
              Write-Output "mtime: $($f.LastWriteTime)"
            } else {
              Write-Output "go.exe (other): $($f.FullName) mtime=$($f.LastWriteTime)"
            }
          }
        } else {
          Write-Output "No instrumented go.exe found!"
        }
        Write-Output "=== INSTRUMENTED compile.exe ==="
        $instCompFiles = Get-ChildItem -Path "$env:USERPROFILE\.xgo\go-instrument" -Recurse -Filter "compile.exe" -ErrorAction SilentlyContinue
        if ($instCompFiles) {
          foreach ($f in $instCompFiles) {
            Write-Output "compile.exe: $($f.FullName)"
            $md5 = (Get-FileHash -Algorithm MD5 -Path $f.FullName).Hash
            Write-Output "MD5: $md5"
            Write-Output "mtime: $($f.LastWriteTime)"
          }
        } else {
          Write-Output "No instrumented compile.exe found!"
        }
      continue-on-error: true

    # === Check if ORIGINAL go.exe/compile.exe were MODIFIED by --with-setup ===
    - name: MD5 of ORIGINAL go.exe and compile.exe (after xgo run)
      shell: pwsh
      if: always()
      run: |
        Write-Output "=== ORIGINAL go.exe (after xgo) ==="
        $goExe = "$env:GO_ROOT\bin\go.exe"
        if (Test-Path $goExe) {
          $md5 = (Get-FileHash -Algorithm MD5 -Path $goExe).Hash
          Write-Output "Path: $goExe"
          Write-Output "MD5: $md5"
          Write-Output "mtime: $((Get-Item $goExe).LastWriteTime)"
        } else { Write-Output "NOT FOUND: $goExe" }
        Write-Output "=== ORIGINAL compile.exe (after xgo) ==="
        $compileExe = "$env:GO_ROOT\pkg\tool\windows_amd64\compile.exe"
        if (Test-Path $compileExe) {
          $md5 = (Get-FileHash -Algorithm MD5 -Path $compileExe).Hash
          Write-Output "Path: $compileExe"
          Write-Output "MD5: $md5"
          Write-Output "mtime: $((Get-Item $compileExe).LastWriteTime)"
        } else { Write-Output "NOT FOUND: $compileExe" }
      continue-on-error: true

    # === Existing diagnostic steps below ===
    - name: Search overlay for __xgo_trap / __xgo_init markers
      shell: pwsh
      if: always()
      run: |
        $projFile = "runtime/test/.xgo/gen/overlay/PROJECT/functab/functab_mini/functab_mini_test.go"
        $rebFile = "runtime/test/.xgo/gen/overlay/a/xgo/xgo/runtime/test/functab/functab_mini/functab_mini_test.go"
        foreach ($f in @($projFile, $rebFile)) {
          Write-Output "=== Checking: $f ==="
          if (Test-Path $f) {
            Write-Output "EXISTS, size=$( (Get-Item $f).Length )"
            $hasMarkers = Select-String -Path $f -Pattern "__xgo_init|__xgo_register|__xgo_trap_0" -List
            if ($hasMarkers) {
              Write-Output "HAS __xgo_ markers: $($hasMarkers.Line)"
            } else {
              Write-Output "NO __xgo_ markers found"
              Write-Output "--- Full content ---"
              Get-Content $f
            }
          } else {
            Write-Output "DOES NOT EXIST"
          }
        }
      continue-on-error: true

    - name: Search overlay for any file with __xgo_init
      shell: pwsh
      if: always()
      run: |
        $matches = Select-String -Path "runtime/test/.xgo/gen/overlay\*\*\*.go" -Pattern "__xgo_init_" -List -ErrorAction SilentlyContinue
        if ($matches) {
          Write-Output "Files with __xgo_init_:"
          $matches | ForEach-Object { Write-Output "$($_.Path): $($_.Line)" }
        } else {
          Write-Output "NO files with __xgo_init_ found in overlay"
        }
      continue-on-error: true

    - name: List ALL functab_mini files under overlay
      shell: pwsh
      if: always()
      run: |
        Get-ChildItem -Path "runtime/test/.xgo/gen/overlay" -Recurse -Filter "functab_mini*" -ErrorAction SilentlyContinue | ForEach-Object {
          Write-Output "FILE: $($_.FullName)"
        }
      continue-on-error: true

    - name: Dump overlay JSON (check key paths)
      shell: pwsh
      if: always()
      run: |
        if (Test-Path runtime/test/.xgo/gen/overlay.json) {
          $json = Get-Content runtime/test/.xgo/gen/overlay.json | ConvertFrom-Json
          $json.Replace.PSObject.Properties | Where-Object { $_.Name -match "functab_mini" } | ForEach-Object {
            Write-Output "Key: $($_.Name)"
            Write-Output "Val: $($_.Value)"
          }
        } else {
          Write-Output "overlay.json not found"
        }
      continue-on-error: true

    - name: Check replacement go.mod exists
      shell: pwsh
      if: always()
      run: |
        $modfile = Get-ChildItem -Path "runtime/test/.xgo/gen/overlay" -Recurse -Filter "go.mod" -ErrorAction SilentlyContinue
        if ($modfile) {
          Write-Output "Found go.mod: $($modfile.FullName)"
          Get-Content $modfile.FullName
        } else {
          Write-Output "No go.mod found under overlay"
        }
      continue-on-error: true

    - name: Manual rebuild verification
      shell: pwsh
      if: always()
      run: |
        $instRoot = Get-ChildItem -Path "$env:USERPROFILE\.xgo\go-instrument" -Directory -ErrorAction SilentlyContinue | ForEach-Object { Get-ChildItem -Path $_.FullName -Directory -Filter "go1.*" -ErrorAction SilentlyContinue } | Select-Object -First 1
        if ($instRoot) {
          $goroot = $instRoot.FullName
          $goBin = Join-Path $goroot "bin\go.exe"
          $compileOut = Join-Path $goroot "pkg\tool\windows_amd64\compile_test.exe"
          Write-Output "GOROOT: $goroot"
          Write-Output "go binary: $goBin"
          Write-Output "go binary exists: $(Test-Path $goBin)"
          Write-Output "compile output: $compileOut"

          $origCompile = Join-Path $goroot "pkg\tool\windows_amd64\compile.exe"
          if (Test-Path $origCompile) {
            $origMD5 = (Get-FileHash -Algorithm MD5 -Path $origCompile).Hash
            Write-Output "ORIGINAL compile.exe MD5: $origMD5"
          } else {
            Write-Output "compile.exe NOT FOUND at $origCompile"
          }

          Write-Output "patch dir exists: $(Test-Path (Join-Path $goroot 'src\cmd\compile\internal\xgo_rewrite_internal\patch'))"
          Write-Output "gc/main.go has xgo import: $(Select-String -Path (Join-Path $goroot 'src\cmd\compile\internal\gc\main.go') -Pattern 'xgo_rewrite' -List -SimpleMatch | Select-Object -ExpandProperty Line)"

          Write-Output ""
          Write-Output "=== Running: go build -v -a -o $compileOut cmd/compile ==="
          $env:GOROOT = $goroot
          $env:GOTOOLCHAIN = "local"
          $env:GO_BYPASS_XGO = "true"
          $env:GOOS = ""
          $env:GOARCH = ""
          $env:GOPATH = ""
          $stderrFile = "$env:TEMP\xgo_manual_build_stderr.txt"
          Push-Location (Join-Path $goroot "src\cmd")
          try {
            & $goBin build -v -a -o $compileOut cmd/compile 2>"$stderrFile"
            Write-Output "Build exit code: $LASTEXITCODE"
            Write-Output "=== Build stderr ==="
            if (Test-Path $stderrFile) { Get-Content $stderrFile }
            if (Test-Path $compileOut) {
              $newMD5 = (Get-FileHash -Algorithm MD5 -Path $compileOut).Hash
              Write-Output "NEW compile_test.exe MD5: $newMD5"
              Write-Output "SAME? $(if ($newMD5 -eq $origMD5) {'YES - binary unchanged'} else {'NO - binary changed!'})"
            } else {
              Write-Output "ERROR: compile_test.exe was NOT created!"
              Get-ChildItem (Join-Path $goroot "pkg\tool\windows_amd64") -ErrorAction SilentlyContinue | ForEach-Object { Write-Output "files: $($_.Name)" }
            }
          } finally {
            Pop-Location
          }
        } else {
          Write-Output "Instrument GOROOT not found"
        }
      continue-on-error: true

    - name: List ALL files in pkg/tool/windows_amd64
      shell: pwsh
      if: always()
      run: |
        $instRoot = Get-ChildItem -Path "$env:USERPROFILE\.xgo\go-instrument" -Directory -ErrorAction SilentlyContinue | ForEach-Object { Get-ChildItem -Path $_.FullName -Directory -Filter "go1.*" -ErrorAction SilentlyContinue } | Select-Object -First 1
        if ($instRoot) {
          $toolDir = Join-Path $instRoot.FullName "pkg\tool\windows_amd64"
          Write-Output "Listing: $toolDir"
          if (Test-Path $toolDir) {
            Get-ChildItem $toolDir | ForEach-Object {
              $md5 = (Get-FileHash -Algorithm MD5 -Path $_.FullName).Hash
              Write-Output "$($_.Name) size=$($_.Length) md5=$md5"
            }
          } else { Write-Output "Tool dir not found" }
        }
      continue-on-error: true

    - name: Dump link init debug log
      shell: pwsh
      if: always()
      run: |
        $log = "$env:TEMP\xgo_link_init_debug.log"
        if (Test-Path $log) {
          Write-Output "=== link init debug log ==="
          Get-Content $log
        } else {
          Write-Output "No link init debug log at $log"
        }
      continue-on-error: true

    - name: Check if patch files applied to instrumented GOROOT source
      shell: pwsh
      if: always()
      run: |
        $instRoot = Get-ChildItem -Path "$env:USERPROFILE\.xgo\go-instrument" -Directory -ErrorAction SilentlyContinue | ForEach-Object { Get-ChildItem -Path $_.FullName -Directory -Filter "go1.*" -ErrorAction SilentlyContinue } | Select-Object -First 1
        if ($instRoot) {
          $mainGo = Join-Path $instRoot.FullName "src\cmd\compile\main.go"
          Write-Output "Checking: $mainGo"
          if (Test-Path $mainGo) {
            Write-Output "EXISTS (compile/main.go), first 20 lines:"
            Get-Content $mainGo -TotalCount 20
          } else { Write-Output "compile/main.go NOT FOUND" }

          $gcMainGo = Join-Path $instRoot.FullName "src\cmd\compile\internal\gc\main.go"
          Write-Output "Checking: $gcMainGo"
          if (Test-Path $gcMainGo) {
            Write-Output "EXISTS (gc/main.go), first 20 lines:"
            Get-Content $gcMainGo -TotalCount 20
          } else { Write-Output "gc/main.go NOT FOUND" }

          Write-Output ""
          Write-Output "=== All files under src/cmd/compile/ (first 30) ==="
          Get-ChildItem -Path (Join-Path $instRoot.FullName "src\cmd\compile") -Recurse -File -ErrorAction SilentlyContinue | Select-Object -First 30 | ForEach-Object { Write-Output $_.FullName.Replace($instRoot.FullName, '') }

          $patchDir = Join-Path $instRoot.FullName "src\cmd\compile\internal\xgo_rewrite_internal\patch"
          Write-Output ""
          Write-Output "Checking patch dir: $patchDir"
          if (Test-Path $patchDir) {
            $files = Get-ChildItem -Path $patchDir -File -ErrorAction SilentlyContinue
            Write-Output "Files: $($files.Count)"
            $files | ForEach-Object { Write-Output "  $($_.Name)" }
          } else {
            Write-Output "patch dir NOT FOUND"
          }
        } else {
          Write-Output "Instrument GOROOT not found"
        }
      continue-on-error: true
