name: Debug NoXPos

on:
  push:
    branches: [ "master", "dev-go1.25" ]
  pull_request:
    branches: [ "master" ]

jobs:
  debug-noxpos:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.25'

    - name: Debug environment
      run: |
        echo "GOROOT: $(go env GOROOT)"
        echo "GOPATH: $(go env GOPATH)"
        echo "PATH: $PATH"
        echo "go version: $(go version)"
        echo "uname: $(uname -m)"

    - name: Install xgo to PATH
      run: go install ./cmd/xgo

    - name: Verify xgo in PATH
      run: |
        echo "xgo location: $(which xgo)"
        xgo revision

    - name: Run xgo setup (reproduces error)
      run: |
        GOROOT=$(go env GOROOT)
        echo "Running: xgo setup --reset-instrument --with-goroot ${GOROOT} --log-debug=stdout"
        xgo setup --reset-instrument --with-goroot "${GOROOT}" --log-debug=stdout
