name: Go 1.22

on:
  push:
    branches: [ "dev-go1.25" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-go@v4
      with:
        go-version: '1.22'
    - run: go run ./script/run-test --install-xgo --reset-instrument --log-debug -v -short
