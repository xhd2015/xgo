# Debug: prove ; separator causes syntax error at package level
name: Go Debug CRLF Semicolon

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:

  test-semicolon-syntax:
    strategy:
      matrix:
        os: [ windows-latest ]
        go: [ '1.25' ]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '${{ matrix.go }}'

    - name: Run semicolon syntax test
      shell: cmd
      run: go run ./test/integrations/test_semicolon_syntax
