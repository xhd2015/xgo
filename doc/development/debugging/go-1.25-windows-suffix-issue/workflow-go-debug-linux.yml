# Debug workflow for functab on Linux (control/compare)
name: Go Debug Linux

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:

  debug-linux-functab:
    strategy:
      matrix:
        os: [ ubuntu-latest ]
        go: [ '1.25' ]
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '${{ matrix.go }}'

    - name: Debug functab mini
      run: go run ./script/run-test --install-xgo --with-setup --reset-instrument --log-debug -v ./runtime/test/functab/functab_mini
      continue-on-error: true

    - name: Check instrumented GOROOT and compiled binary
      if: always()
      run: |
        goroot="$HOME/.xgo/go-instrument"
        echo "GOROOT base: $goroot"
        compiler=$(find "$goroot" -name "compile" -type f | head -1)
        if [ -n "$compiler" ] && [ -f "$compiler" ]; then
          echo "compile found: $compiler"
          echo "compile size: $(stat -c%s "$compiler" 2>/dev/null || wc -c < "$compiler") bytes"
        else
          echo "ERROR: compile NOT FOUND"
        fi
      continue-on-error: true

    - name: Search overlay for __xgo_trap / __xgo_init markers
      if: always()
      run: |
        found=$(grep -rl '__xgo_trap\|__xgo_init\|__xgo_register' runtime/test/.xgo/gen/overlay/*/functab/functab_mini/ 2>/dev/null || echo "")
        if [ -n "$found" ]; then
          echo "Found __xgo_ markers:"
          echo "$found"
        else
          echo "WARNING: functab_mini files do NOT contain __xgo_ instrumentation markers"
        fi
      continue-on-error: true

    - name: Search overlay for any file with __xgo_init
      if: always()
      run: |
        grep -rl "__xgo_init_" runtime/test/.xgo/gen/overlay/ 2>/dev/null | head -5 || echo "No files with __xgo_init_ found"
      continue-on-error: true

    - name: List ALL functab_mini files under overlay
      if: always()
      run: |
        find runtime/test/.xgo/gen/overlay -name "functab_mini*" -type f 2>/dev/null || echo "No functab_mini files found"
      continue-on-error: true

    - name: Dump overlay JSON (check key paths)
      if: always()
      run: |
        grep -A1 '"functab_mini' runtime/test/.xgo/gen/overlay.json 2>/dev/null || echo "No functab_mini entries in overlay JSON"
      continue-on-error: true

    - name: Check replacement go.mod exists
      if: always()
      run: |
        modfile=$(find runtime/test/.xgo/gen/overlay -name "go.mod" | head -1)
        if [ -n "$modfile" ]; then
          echo "Found go.mod: $modfile"
          cat "$modfile"
        else
          echo "No go.mod found under overlay"
        fi
      continue-on-error: true

    - name: Dump link init debug log
      if: always()
      run: |
        log="/tmp/xgo_link_init_debug.log"
        if [ -f "$log" ]; then
          echo "=== link init debug log ==="
          cat "$log"
        else
          echo "No link init debug log at $log"
        fi
      continue-on-error: true
